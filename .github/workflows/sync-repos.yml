name: Sync to External Repos

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to repo1 (medi-nexus-plus)
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git remote add repo1 https://x-access-token:${SYNC_TOKEN}@github.com/ryashpal18-cmyk/medi-nexus-plus-f5179adc.git
          git push repo1 HEAD:main --force

      - name: Push to repo2 (balaji-ortho-connect-electron)
        env:
          SYNC_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git remote add repo2 https://x-access-token:${SYNC_TOKEN}@github.com/ryashpal18-cmyk/balaji-ortho-connect-electron.git
          git push repo2 HEAD:main --force
